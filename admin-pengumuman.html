<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="sidebar-brand"><div class="sidebar-brand-icon"><i class="fa-solid fa-house-chimney"></i></div><div><div class="sidebar-brand-name">RT 07 Admin</div><span class="sidebar-brand-sub">Kelurahan Bahagia</span></div></div>
<nav class="sidebar-nav">

<div class="nav-section-label">LAYANAN</div>
<a href="admin-pendaftaran.html" class="sidebar-link"><i class="fa-solid fa-user-plus"></i> Pendaftaran<span class="sidebar-badge" data-badge-stat="pendaftaranPending">0</span></a>
<a href="admin-surat.html" class="sidebar-link"><i class="fa-solid fa-file-lines"></i> Pengajuan Surat<span class="sidebar-badge" data-badge-stat="suratPending">0</span></a>
<a href="admin-pembayaran.html" class="sidebar-link"><i class="fa-solid fa-money-bill-wave"></i> Iuran</a>
<a href="admin-kas.html" class="sidebar-link"><i class="fa-solid fa-wallet"></i> Kas</a>
<a href="admin-pengaduan.html" class="sidebar-link"><i class="fa-solid fa-triangle-exclamation"></i> Pengaduan<span class="sidebar-badge" data-badge-stat="pengaduanBaru">0</span></a>

</nav>
<div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar">A</div><div><div class="sidebar-user-name">Admin RT</div><div class="sidebar-user-role">Administrator</div></div></div><button class="btn-logout" id="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
</aside>
<div class="admin-content">
<header class="topbar">
<div class="topbar-left"><button class="sidebar-toggle" id="sidebar-toggle"><span></span><span></span><span></span></button><div><div class="topbar-title">News & Agenda</div><div class="topbar-subtitle">Kelola konten informasi publik</div></div></div>
</header>
<main class="page-content">
<div style="display:flex;gap:.5rem;margin-bottom:1.5rem;background:#f1f5f9;border-radius:var(--radius-md);padding:.25rem;width:fit-content"><button class="admin-tab-btn active" id="tab-peng-btn" onclick="switchMainTab('pengumuman')"><i class="fa-solid fa-bullhorn" style="margin-right:6px"></i> News</button><button class="admin-tab-btn" id="tab-agd-btn" onclick="switchMainTab('agenda')"><i class="fa-regular fa-calendar-days" style="margin-right:6px"></i> Agenda</button></div>
<div id="section-pengumuman"><div class="admin-card"><div class="admin-card-header"><div class="admin-card-title"><i class="fa-solid fa-bullhorn"></i> Daftar News</div><button class="btn btn-primary btn-sm" onclick="openPengumumanForm()"><i class="fa-solid fa-plus"></i> Tambah Baru</button></div><div id="peng-list"></div></div></div>
<div id="section-agenda" style="display:none"><div class="admin-card"><div class="admin-card-header"><div class="admin-card-title"><i class="fa-regular fa-calendar-days"></i> Daftar Agenda</div><button class="btn btn-primary btn-sm" onclick="openAgendaForm()"><i class="fa-solid fa-plus"></i> Tambah Baru</button></div><div id="agenda-list"></div></div></div>
</main>
</div>
</div>
<div class="modal-overlay" id="modal-peng"><div class="admin-modal"><div class="modal-header"><div class="modal-title" id="modal-peng-title"><i class="fa-solid fa-bullhorn"></i> Tambah News</div><button class="modal-close"><i class="fa-solid fa-xmark"></i></button></div><form onsubmit="savePengumuman(event)"><div class="form-row single"><div class="form-group"><label>Judul <span class="required">*</span></label><input type="text" id="peng-judul" class="form-control" required placeholder="Judul news"></div></div><div class="form-row"><div class="form-group"><label>Kategori <span class="required">*</span></label><select id="peng-kategori" class="form-control" required><option value="penting">⚠️ Penting</option><option value="info">ℹ️ Info</option><option value="kegiatan">📅 Kegiatan</option><option value="umum">📢 Umum</option></select></div><div class="form-group"><label>Tanggal <span class="required">*</span></label><input type="date" id="peng-tanggal" class="form-control" required></div></div><div class="form-row single"><div class="form-group"><label>Isi News <span class="required">*</span></label><textarea id="peng-konten" class="form-control" rows="5" required placeholder="Tulis isi news di sini..."></textarea></div></div><input type="hidden" id="peng-id"><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal('modal-peng')">Batal</button><button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Simpan</button></div></form></div></div>
<div class="modal-overlay" id="modal-agenda"><div class="admin-modal"><div class="modal-header"><div class="modal-title" id="modal-agenda-title"><i class="fa-regular fa-calendar-days"></i> Tambah Agenda</div><button class="modal-close"><i class="fa-solid fa-xmark"></i></button></div><form onsubmit="saveAgenda(event)"><div class="form-row single"><div class="form-group"><label>Nama Kegiatan <span class="required">*</span></label><input type="text" id="agd-judul" class="form-control" required placeholder="Nama acara/kegiatan"></div></div><div class="form-row triple"><div class="form-group"><label>Tanggal <span class="required">*</span></label><input type="date" id="agd-tanggal" class="form-control" required></div><div class="form-group"><label>Waktu <span class="required">*</span></label><input type="time" id="agd-waktu" class="form-control" required></div><div class="form-group"><label>Kategori</label><select id="agd-kategori" class="form-control"><option value="rapat">🗣️ Rapat</option><option value="kegiatan">🎉 Kegiatan</option><option value="kesehatan">🏥 Kesehatan</option><option value="sosial">🤝 Sosial</option><option value="lainnya">📌 Lainnya</option></select></div></div><div class="form-row single"><div class="form-group"><label>Lokasi <span class="required">*</span></label><input type="text" id="agd-lokasi" class="form-control" required placeholder="Lokasi kegiatan"></div></div><div class="form-row single"><div class="form-group"><label>Deskripsi</label><textarea id="agd-deskripsi" class="form-control" rows="3" placeholder="Keterangan tambahan..."></textarea></div></div><input type="hidden" id="agd-id"><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal('modal-agenda')">Batal</button><button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Simpan</button></div></form></div></div>
<div id="admin-toast-container" class="toast-container"></div>
<script src="data.js?v=3"></script>
<script src="admin.js"></script>
<script>
function switchMainTab(tab){document.getElementById('section-pengumuman').style.display=tab==='pengumuman'?'block':'none',document.getElementById('section-agenda').style.display=tab==='agenda'?'block':'none',document.getElementById('tab-peng-btn').classList.toggle('active',tab==='pengumuman'),document.getElementById('tab-agd-btn').classList.toggle('active',tab==='agenda')}
async function loadPengumuman(){const list=await DB.getPengumuman();const el=document.getElementById('peng-list');el.innerHTML=list.map((p=>`<div style="border-bottom:1px solid var(--border);padding:1rem 0;display:flex;justify-content:space-between;gap:1rem"><div><div style="font-weight:700">${p.judul}</div><div style="font-size:.8rem;color:var(--text-gray)">${p.kategori} • ${formatDate(p.tanggal)}</div></div><div style="display:flex;gap:.4rem"><button class="btn btn-secondary btn-xs" onclick="editPeng('${p.id}')"><i class="fa-solid fa-pen"></i> Edit</button><button class="btn btn-danger btn-xs" onclick="delPeng('${p.id}')"><i class="fa-solid fa-trash"></i> Hapus</button></div></div>`)).join('')}
function openPengumumanForm(){document.getElementById('peng-id').value='',document.getElementById('peng-judul').value='',document.getElementById('peng-kategori').value='penting',document.getElementById('peng-tanggal').value=DB.today(),document.getElementById('peng-konten').value='',document.getElementById('modal-peng-title').innerHTML='<i class="fa-solid fa-bullhorn"></i> Tambah News',openModal('modal-peng')}
function editPeng(id){DB.getPengumuman().then((list=>{const p=list.find((e=>e.id===id));if(!p)return;document.getElementById('peng-id').value=p.id,document.getElementById('peng-judul').value=p.judul,document.getElementById('peng-kategori').value=p.kategori,document.getElementById('peng-tanggal').value=p.tanggal,document.getElementById('peng-konten').value=p.konten,document.getElementById('modal-peng-title').innerHTML='<i class="fa-solid fa-bullhorn"></i> Edit News',openModal('modal-peng')}))}
async function savePengumuman(e){e.preventDefault();const id=document.getElementById('peng-id').value,data={judul:document.getElementById('peng-judul').value,kategori:document.getElementById('peng-kategori').value,tanggal:document.getElementById('peng-tanggal').value,konten:document.getElementById('peng-konten').value};id?await DB.updatePengumuman(id,data):await DB.addPengumuman(data),adminToast('News disimpan','success'),closeModal('modal-peng'),loadPengumuman()}
async function delPeng(id){const ok=await adminConfirm('Hapus news ini?');ok&&(await DB.deletePengumuman(id),adminToast('News dihapus','info'),loadPengumuman())}
async function loadAgenda(){const list=await DB.getAgenda();const el=document.getElementById('agenda-list');el.innerHTML=list.map((a=>`<div style="border-bottom:1px solid var(--border);padding:1rem 0;display:flex;justify-content:space-between;gap:1rem"><div><div style="font-weight:700">${a.judul}</div><div style="font-size:.8rem;color:var(--text-gray)">${formatDate(a.tanggal)} • ${a.waktu} • ${a.lokasi}</div></div><div style="display:flex;gap:.4rem"><button class="btn btn-secondary btn-xs" onclick="editAgenda('${a.id}')"><i class="fa-solid fa-pen"></i> Edit</button><button class="btn btn-danger btn-xs" onclick="delAgenda('${a.id}')"><i class="fa-solid fa-trash"></i> Hapus</button></div></div>`)).join('')}
function openAgendaForm(){document.getElementById('agd-id').value='',document.getElementById('agd-judul').value='',document.getElementById('agd-tanggal').value=DB.today(),document.getElementById('agd-waktu').value='19:00',document.getElementById('agd-kategori').value='kegiatan',document.getElementById('agd-lokasi').value='',document.getElementById('agd-deskripsi').value='',document.getElementById('modal-agenda-title').innerHTML='<i class="fa-regular fa-calendar-days"></i> Tambah Agenda',openModal('modal-agenda')}
function editAgenda(id){DB.getAgenda().then((list=>{const a=list.find((e=>e.id===id));if(!a)return;document.getElementById('agd-id').value=a.id,document.getElementById('agd-judul').value=a.judul,document.getElementById('agd-tanggal').value=a.tanggal,document.getElementById('agd-waktu').value=a.waktu,document.getElementById('agd-kategori').value=a.kategori||'kegiatan',document.getElementById('agd-lokasi').value=a.lokasi,document.getElementById('agd-deskripsi').value=a.deskripsi||'',document.getElementById('modal-agenda-title').innerHTML='<i class="fa-regular fa-calendar-days"></i> Edit Agenda',openModal('modal-agenda')}))}
async function saveAgenda(e){e.preventDefault();const id=document.getElementById('agd-id').value,data={judul:document.getElementById('agd-judul').value,tanggal:document.getElementById('agd-tanggal').value,waktu:document.getElementById('agd-waktu').value,kategori:document.getElementById('agd-kategori').value,lokasi:document.getElementById('agd-lokasi').value,deskripsi:document.getElementById('agd-deskripsi').value};id?await DB.updateAgenda(id,data):await DB.addAgenda(data),adminToast('Agenda disimpan','success'),closeModal('modal-agenda'),loadAgenda()}
async function delAgenda(id){const ok=await adminConfirm('Hapus agenda ini?');ok&&(await DB.deleteAgenda(id),adminToast('Agenda dihapus','info'),loadAgenda())}
document.addEventListener('DOMContentLoaded',()=>{loadPengumuman();loadAgenda()});
</script>
</body>
</html>
