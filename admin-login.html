<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — RT 07</title>
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0f172a 0%,#064e3b 60%,#059669 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;font-family:'Inter',sans-serif}
.login-wrap{width:100%;max-width:420px;animation:fadeInUp .6s ease}
.login-card{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.3);border-radius:32px;padding:3rem;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.login-logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#10b981,#059669);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:white;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(16,185,129,.4)}
.login-logo h1{font-family:'Poppins',sans-serif;font-size:1.5rem;font-weight:800;color:#0f172a;margin-bottom:.25rem}
.login-logo p{font-size:.875rem;color:#64748b}
.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-size:.8rem;font-weight:700;color:#0f172a;margin-bottom:.5rem;letter-spacing:.025em}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:1rem}
.input-wrap input{width:100%;padding:.75rem 2.8rem .75rem 2.8rem;border:2px solid #e2e8f0;border-radius:12px;font-size:.9rem;font-family:'Inter',sans-serif;color:#0f172a;outline:none;transition:all .3s;background:white}
.input-wrap input:focus{border-color:#10b981;box-shadow:0 0 0 4px rgba(16,185,129,.1)}
.input-wrap input.error-field{border-color:#ef4444}
.show-pass{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:rgba(16,185,129,.05);border:none;cursor:pointer;color:#94a3b8;font-size:1rem;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.show-pass:hover{color:#0f172a}
.btn-login{width:100%;padding:.875rem;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.45)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:.75rem 1rem;font-size:.85rem;color:#b91c1c;display:none;align-items:center;gap:.5rem;margin-bottom:1rem}
.error-box.show{display:flex}
.login-footer{text-align:center;margin-top:1.5rem;font-size:.8rem;color:#94a3b8}
.demo-creds{background:rgba(16,185,129,.05);border:1px dashed rgba(16,185,129,.3);border-radius:12px;padding:.6rem 1rem;font-size:.8rem;color:#065f46;margin-bottom:2rem;text-align:center;display:inline-block;width:100%}
.demo-creds strong{color:#059669;background:rgba(16,185,129,.1);padding:2px 6px;border-radius:4px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bg-circles{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.bg-circle{position:absolute;border-radius:50%;background:rgba(255,255,255,.04)}
</style>
</head>
<body>
<div class="bg-circles"><div class="bg-circle" style="width:400px;height:400px;top:-100px;right:-100px"></div><div class="bg-circle" style="width:300px;height:300px;bottom:-80px;left:-80px"></div></div>
<div class="login-wrap">
<div class="login-card">
<div class="login-logo"><div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div><h1>Portal Admin RT 07</h1><p>Masuk untuk mengakses dashboard admin</p></div>
<div class="error-box" id="error-box"><i class="fa-solid fa-circle-xmark"></i><span id="error-msg-text">Username atau password salah</span></div>
<form onsubmit="handleLogin(event)">
<div class="form-group"><label>USERNAME</label><div class="input-wrap"><i class="fa-solid fa-user"></i><input type="text" id="username" placeholder="Masukkan username" autocomplete="username"></div></div>
<div class="form-group"><label>PASSWORD</label><div class="input-wrap"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"><button type="button" class="show-pass" id="toggle-pass"><i class="fa-regular fa-eye" id="eye-icon"></i></button></div></div>
<button type="submit" class="btn-login" id="btn-login"><i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard</button>
</form>
<div class="login-footer"><a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Kembali ke Portal Warga</a></div>
</div>
</div>
<style>
.back-link{display:inline-flex;align-items:center;gap:8px;color:#64748b;font-weight:600;padding:.5rem 1rem;border-radius:50px;transition:all .3s;text-decoration:none}
.back-link:hover{background:rgba(16,185,129,.08);color:#10b981}
</style>
<script src="data.js?v=3"></script>
<script src="admin.js"></script>
<script>
const sess=sessionStorage.getItem('rt_admin_session');if(sess)window.location.href='admin-dashboard.html';
document.getElementById('toggle-pass').addEventListener('click',function(){const inp=document.getElementById('password');const icon=document.getElementById('eye-icon');if(inp.type==='password'){inp.type='text';icon.className='fa-regular fa-eye-slash';}else{inp.type='password';icon.className='fa-regular fa-eye';}});
async function handleLogin(e){e.preventDefault();const username=document.getElementById('username').value.trim();const password=document.getElementById('password').value;const btn=document.getElementById('btn-login');const errBox=document.getElementById('error-box');errBox.classList.remove('show');document.getElementById('username').classList.remove('error-field');document.getElementById('password').classList.remove('error-field');if(!username||!password){errBox.classList.add('show');document.getElementById('error-msg-text').textContent='Username dan password wajib diisi';return;}btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Memeriksa...';const success=await Auth.login(username,password);setTimeout(()=>{if(success){btn.innerHTML='<i class="fa-solid fa-check"></i> Berhasil! Mengalihkan...';btn.style.background='linear-gradient(135deg,#22c55e,#16a34a)';const redir=sessionStorage.getItem('rt_redirect')||'admin-dashboard.html';sessionStorage.removeItem('rt_redirect');setTimeout(()=>window.location.href=redir,600);}else{errBox.classList.add('show');document.getElementById('error-msg-text').textContent='Username atau password salah. Coba lagi.';document.getElementById('username').classList.add('error-field');document.getElementById('password').classList.add('error-field');document.getElementById('password').value='';btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard';document.querySelector('.login-card').style.animation='shake .4s ease';setTimeout(()=>{document.querySelector('.login-card').style.animation='';},400);}},800);}
</script>
<style>
body{background:linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),url('loginadmin.png') no-repeat center center fixed;background-size:cover}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</body>
</html>
