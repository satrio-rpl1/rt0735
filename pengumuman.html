<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News — RT 07</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">
                <div class="brand-icon"><i class="fa-solid fa-house-chimney"></i></div>
                <div>
                    <div>RT 07</div>
                    <div style="font-size:.7rem;font-weight:400;color:var(--text-gray)">Kelurahan Bahagia</div>
                </div>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="index.html">Beranda</a>
                <a href="pendaftaran.html">Pendaftaran</a>
                <a href="pengajuan-surat.html">Surat</a>
                <a href="pembayaran.html">Iuran</a>
                <a href="pengaduan.html">Pengaduan</a>
                <a href="pengumuman.html" class="active">News</a>
                <a href="agenda.html">Agenda</a>
                <a href="admin-login.html" class="btn-admin-nav"><i class="fa-solid fa-lock"></i> Admin</a>
            </div>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-header">
        <div class="page-header-inner">
            <div class="breadcrumb"><a href="index.html">Beranda</a><span>/</span><span>News</span></div>
            <h1><i class="fa-solid fa-bullhorn"></i> News RT 07</h1>
            <p>Informasi dan berita resmi dari pengurus RT 07 Bahagia</p>
        </div>
    </div>

    <section class="section" style="margin-top:-3rem;padding-top:0">
        <div class="section-inner">
            <div
                style="background:white;border-radius:var(--radius-xl);padding:1.5rem;box-shadow:var(--shadow-md);margin-bottom:1.5rem">
                <div class="search-bar" style="margin-bottom:0">
                    <input type="text" class="search-input" id="search" placeholder="🔍 Cari berita..."
                        oninput="renderList()">
                    <select class="filter-select" id="filter-kat" onchange="renderList()">
                        <option value="">Semua Kategori</option>
                        <option value="penting">⚠️ Penting</option>
                        <option value="info">ℹ️ Info</option>
                        <option value="kegiatan">📅 Kegiatan</option>
                        <option value="umum">📢 Umum</option>
                    </select>
                </div>
            </div>
            <div id="pengumuman-list" class="pengumuman-grid"></div>
            <div id="empty-state" style="display:none" class="empty-state">
                <i class="fa-solid fa-bell-slash"></i>
                <h3>Tidak Ada Berita</h3>
                <p>Belum ada berita yang sesuai dengan pencarian Anda</p>
            </div>
        </div>
    </section>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="modal-detail">
        <div class="modal" style="max-width:620px">
            <div class="modal-header">
                <div class="modal-title"><i class="fa-solid fa-bullhorn"></i> Detail Pengumuman</div>
                <button class="modal-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-detail-body"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="data.js?v=3"></script>
    <script src="main.js"></script>
    <script>window.checkProtocol=function(){};</script>
    <script>
        const badgeMap = { penting: 'badge-penting', info: 'badge-info', kegiatan: 'badge-kegiatan', umum: 'badge-umum' };
        const badgeLabel = { penting: '⚠️ Penting', info: 'ℹ️ Info', kegiatan: '📅 Kegiatan', umum: '📢 Umum' };

        async function renderList() {
            const q = document.getElementById('search').value.toLowerCase();
            const kat = document.getElementById('filter-kat').value;
            let list = await DB.getPengumuman();
            if (q) list = list.filter(p => (p.judul + p.konten + p.kategori).toLowerCase().includes(q));
            if (kat) list = list.filter(p => p.kategori === kat);
            const container = document.getElementById('pengumuman-list');
            const empty = document.getElementById('empty-state');
            if (!list.length) { container.innerHTML = ''; empty.style.display = ''; return; }
            empty.style.display = 'none';
            container.innerHTML = list.map(p => `
    <div class="pengumuman-card animate-on-scroll animated" onclick="showDetail('${p.id}')">
      <div class="peng-header">
        <div class="peng-title">${p.judul}</div>
        <span class="peng-badge ${badgeMap[p.kategori] || 'badge-umum'}">${badgeLabel[p.kategori] || p.kategori}</span>
      </div>
      <div class="peng-desc">${p.konten}</div>
      <div class="peng-footer">
        <span class="peng-date"><i class="fa-regular fa-calendar"></i> ${formatDate(p.tanggal)}</span>
        <button class="btn-detail">Selengkapnya <i class="fa-solid fa-arrow-right"></i></button>
      </div>
    </div>`).join('');
        }

        async function showDetail(id) {
            const list = await DB.getPengumuman();
            const p = list.find(x => x.id === id);
            if (!p) return;
            document.getElementById('modal-detail-body').innerHTML = `
    <span class="peng-badge ${badgeMap[p.kategori] || 'badge-umum'}" style="display:inline-flex;margin-bottom:1rem">${badgeLabel[p.kategori] || p.kategori}</span>
    <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:.75rem;line-height:1.3">${p.judul}</h2>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;font-size:.85rem;color:var(--text-gray)">
      <span><i class="fa-regular fa-calendar" style="color:var(--primary)"></i> ${formatDate(p.tanggal)}</span>
      <span><i class="fa-solid fa-user" style="color:var(--primary)"></i> ${p.penulis || 'Admin RT'}</span>
    </div>
    <div style="line-height:1.8;color:var(--text-dark);white-space:pre-wrap">${p.konten}</div>`;
            openModal('modal-detail');
        }

        document.addEventListener('DOMContentLoaded', renderList);
    </script>
</body>

</html>
